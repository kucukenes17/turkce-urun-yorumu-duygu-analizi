name: tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install (test-only deps)
        run: |
          python -m pip install --upgrade pip
          # Smoke testler ağır paket (torch/transformers) gerektirmez.
          pip install "scikit-learn>=1.4" "joblib>=1.3" "pandas>=2.2" "numpy>=1.26" "pytest>=8.0"
      - name: Run tests
        run: pytest -q
